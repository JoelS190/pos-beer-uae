version: '3.8'

services:
  web:
    build: .
    container_name: pos_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: pos_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pos_inventario
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  # ¡NUEVO SERVICIO AÑADIDO: CLIENTE WEB DE BASE DE DATOS!
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pos_phpmyadmin
    ports:
      - "8080:80" # Accederás a través del puerto 8080 de tu navegador
    environment:
      PMA_HOST: db # Se conecta internamente al servicio llamado "db"
      PMA_USER: pos_user
      PMA_PASSWORD: pos_password
    depends_on:
      - db
    restart: always

volumes:
  db_data:
